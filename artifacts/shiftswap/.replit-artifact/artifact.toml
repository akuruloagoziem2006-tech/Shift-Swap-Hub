kind = "web"
previewPath = "/"
title = "ShiftSwap"
version = "1.0.0"
id = "artifacts/shiftswap"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23241

[services.development]
run = "pnpm --filter @workspace/shiftswap run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shiftswap", "run", "build" ]
publicDir = "artifacts/shiftswap/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23241"
BASE_PATH = "/"
